<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template Editor — Document Generator BO</title>

  <!-- React -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Monaco Editor loader -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>

  <style>
    /* ── Reset & variables ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #22263a;
      --border:     #2e3347;
      --accent:     #5b8af5;
      --accent-h:   #7aa3ff;
      --danger:     #e05c5c;
      --warn:       #e0a850;
      --success:    #4caf88;
      --text:       #d4d8ef;
      --text-muted: #6b7299;
      --sidebar-w:  320px;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; height: 100vh; overflow: hidden; }

    /* ── Layout ──────────────────────────────────────────────────── */
    #root { display: flex; flex-direction: column; height: 100vh; }

    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .app-header h1 { font-size: 15px; font-weight: 600; letter-spacing: .02em; }
    .app-header .api-badge {
      font-size: 12px; color: var(--text-muted);
      background: var(--surface2); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 20px;
      display: flex; align-items: center; gap: 6px;
    }
    .api-badge input {
      background: transparent; border: none; outline: none;
      color: var(--accent); font-size: 12px; width: 280px;
    }

    .workspace {
      display: flex; flex: 1; min-height: 0;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header span { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
    .btn-icon {
      background: none; border: none; cursor: pointer; color: var(--text-muted);
      padding: 4px; border-radius: 4px; display: flex; align-items: center;
      transition: color .15s, background .15s;
    }
    .btn-icon:hover { color: var(--text); background: var(--surface2); }

    .template-list { overflow-y: auto; flex: 1; padding: 8px 0; }
    .template-item {
      padding: 10px 16px; cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .12s;
    }
    .template-item:hover { background: var(--surface2); }
    .template-item.active { background: var(--surface2); border-left-color: var(--accent); }
    .template-item .t-name { font-size: 13px; font-weight: 500; }
    .template-item .t-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 8px; }

    /* ── Status badge ────────────────────────────────────────────── */
    .status-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      letter-spacing: .05em; padding: 1px 7px; border-radius: 10px;
    }
    .status-ACTIVE     { background: rgba(76,175,136,.15); color: var(--success); }
    .status-INACTIVE   { background: rgba(224,168,80,.12); color: var(--warn); }
    .status-DEPRECATED { background: rgba(224,92,92,.12);  color: var(--danger); }

    /* ── Main panel ──────────────────────────────────────────────── */
    .main {
      flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden;
    }

    .toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .toolbar .t-title { font-weight: 600; font-size: 14px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* buttons */
    .btn {
      border: none; cursor: pointer; border-radius: 6px;
      padding: 6px 14px; font-size: 13px; font-weight: 500;
      transition: opacity .15s, filter .15s;
      display: flex; align-items: center; gap: 5px;
    }
    .btn:disabled { opacity: .4; cursor: default; }
    .btn:not(:disabled):hover { filter: brightness(1.12); }
    .btn-primary   { background: var(--accent);   color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: var(--danger);   color: #fff; }
    .btn-warn      { background: var(--warn);     color: #0f1117; }
    .btn-success   { background: var(--success);  color: #fff; }

    /* meta fields */
    .meta-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .field-group { display: flex; flex-direction: column; gap: 2px; }
    .field-group label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; }
    .field-input {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      border-radius: 5px; padding: 5px 9px; font-size: 13px; outline: none;
      transition: border-color .15s;
    }
    .field-input:focus { border-color: var(--accent); }
    select.field-input { cursor: pointer; }

    /* ── Editor / Preview split ──────────────────────────────────── */
    .editor-area {
      flex: 1; display: flex; min-height: 0; overflow: hidden;
    }
    .editor-pane {
      flex: 1; display: flex; flex-direction: column; min-width: 0; border-right: 1px solid var(--border);
    }
    .editor-pane-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 7px 12px; font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .07em; display: flex; align-items: center; justify-content: space-between;
    }
    #monaco-container { flex: 1; min-height: 0; }

    .preview-pane {
      width: 420px; min-width: 320px; display: flex; flex-direction: column; background: var(--surface);
    }
    .preview-pane-header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 7px 12px; font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: .07em; display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .preview-iframe {
      flex: 1; border: none; background: #fff;
    }

    /* ── Variables panel ─────────────────────────────────────────── */
    .vars-panel {
      background: var(--surface2);
      border-top: 1px solid var(--border);
      padding: 8px 14px; max-height: 96px; overflow-y: auto;
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
    }
    .var-chip {
      background: rgba(91,138,245,.12); border: 1px solid rgba(91,138,245,.25);
      color: var(--accent); border-radius: 12px; padding: 2px 9px; font-size: 11px; font-family: monospace;
    }

    /* ── Empty / loading states ──────────────────────────────────── */
    .placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: var(--text-muted); gap: 12px;
    }
    .placeholder svg { opacity: .3; }
    .placeholder p { font-size: 15px; }

    /* ── Toast ───────────────────────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px; z-index: 9999;
    }
    .toast {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 16px; font-size: 13px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4);
      display: flex; align-items: center; gap: 8px;
      animation: slideIn .2s ease;
    }
    .toast.success { border-left: 3px solid var(--success); }
    .toast.error   { border-left: 3px solid var(--danger); }
    .toast.warn    { border-left: 3px solid var(--warn); }
    @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ── Spinner ─────────────────────────────────────────────────── */
    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const DEFAULT_API = 'http://localhost:8080';
const DOMAINS = ['MISIONES', 'CASHBACK', 'REFERIDOS', 'EMPRESAS'];
const STATUSES = ['ACTIVE', 'INACTIVE', 'DEPRECATED'];

// ── Monaco bootstrap ──────────────────────────────────────────────────────────
let monacoReady = false;
let monacoEditor = null;
let pendingContent = null;

require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
require(['vs/editor/editor.main'], function () {
  monacoReady = true;
  // Register Mustache HTML syntax highlighting (piggyback html)
  monacoEditor = monaco.editor.create(document.getElementById('monaco-container'), {
    language: 'html',
    theme: 'vs-dark',
    automaticLayout: true,
    fontSize: 13,
    minimap: { enabled: false },
    wordWrap: 'on',
    tabSize: 2,
    scrollBeyondLastLine: false,
    renderLineHighlight: 'all',
    lineNumbers: 'on',
  });
  if (pendingContent !== null) {
    monacoEditor.setValue(pendingContent);
    pendingContent = null;
  }
  monacoEditor.onDidChangeModelContent(() => {
    window.__onEditorChange && window.__onEditorChange(monacoEditor.getValue());
  });
});

function setEditorContent(content) {
  if (monacoEditor) {
    monacoEditor.setValue(content || '');
  } else {
    pendingContent = content || '';
  }
}
function getEditorContent() {
  return monacoEditor ? monacoEditor.getValue() : (pendingContent || '');
}

// ── Mustache variable extractor (client-side) ─────────────────────────────────
function extractMustacheVars(html) {
  const matches = [...html.matchAll(/\{\{([#^\/]?)([^!{}>\\s][^}]*)\}\}/g)];
  const vars = [...new Set(matches.map(m => m[2].trim()))].sort();
  return vars;
}

// ── React App ─────────────────────────────────────────────────────────────────
const { useState, useEffect, useRef, useCallback } = React;
const e = React.createElement;

// ── Toast ─────────────────────────────────────────────────────────────────────
function ToastContainer({ toasts }) {
  return e('div', { className: 'toast-container' },
    ...toasts.map(t =>
      e('div', { key: t.id, className: `toast ${t.type}` },
        t.type === 'success' ? '✓' : t.type === 'error' ? '✕' : '⚠',
        e('span', null, t.message)
      )
    )
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [apiBase, setApiBase]           = useState(() => localStorage.getItem('api_base') || DEFAULT_API);
  const [templates, setTemplates]       = useState([]);
  const [selected, setSelected]         = useState(null);   // TemplateDetailResponse
  const [editorHtml, setEditorHtml]     = useState('');
  const [detectedVars, setDetectedVars] = useState([]);
  const [previewHtml, setPreviewHtml]   = useState('');
  const [saving, setSaving]             = useState(false);
  const [loading, setLoading]           = useState(false);
  const [loadingList, setLoadingList]   = useState(false);
  const [toasts, setToasts]             = useState([]);
  // edit meta
  const [editDomain, setEditDomain]     = useState('MISIONES');
  const [editVersion, setEditVersion]   = useState('1.0.0');
  const [editDescription, setEditDesc]  = useState('');

  // Register editor change callback
  useEffect(() => {
    window.__onEditorChange = (val) => {
      setEditorHtml(val);
      setDetectedVars(extractMustacheVars(val));
    };
    return () => { window.__onEditorChange = null; };
  }, []);

  // ── API helpers ─────────────────────────────────────────────────────────────
  const api = useCallback((path, opts = {}) => {
    return fetch(`${apiBase}${path}`, {
      headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
      ...opts,
    }).then(async r => {
      if (!r.ok) {
        const text = await r.text().catch(() => r.statusText);
        throw new Error(`${r.status} — ${text}`);
      }
      const ct = r.headers.get('content-type') || '';
      return ct.includes('application/json') ? r.json() : r.text();
    });
  }, [apiBase]);

  const toast = useCallback((message, type = 'success') => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, message, type }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  }, []);

  // ── Load template list ──────────────────────────────────────────────────────
  const loadList = useCallback(() => {
    setLoadingList(true);
    api('/v1/templates')
      .then(data => setTemplates(data))
      .catch(err => toast(`Error al cargar la lista: ${err.message}`, 'error'))
      .finally(() => setLoadingList(false));
  }, [api, toast]);

  useEffect(() => { loadList(); }, [loadList]);

  // ── Select template ─────────────────────────────────────────────────────────
  const selectTemplate = useCallback((name) => {
    setLoading(true);
    api(`/v1/templates/${encodeURIComponent(name)}`)
      .then(detail => {
        setSelected(detail);
        setEditDomain(detail.domain || 'MISIONES');
        setEditVersion(detail.version || '1.0.0');
        setEditDesc(detail.description || '');
        const html = detail.content || '';
        setEditorHtml(html);
        setDetectedVars(detail.detectedFields || extractMustacheVars(html));
        setPreviewHtml(html);
        setEditorContent(html);
      })
      .catch(err => toast(`Error al cargar el template: ${err.message}`, 'error'))
      .finally(() => setLoading(false));
  }, [api, toast]);

  // ── Preview refresh ─────────────────────────────────────────────────────────
  const refreshPreview = useCallback(() => {
    setPreviewHtml(getEditorContent());
  }, []);

  // ── Save (PUT) ──────────────────────────────────────────────────────────────
  const saveTemplate = useCallback(() => {
    if (!selected) return;
    const content = getEditorContent();
    setSaving(true);
    api(`/v1/templates/${encodeURIComponent(selected.name)}`, {
      method: 'PUT',
      body: JSON.stringify({
        domain: editDomain,
        version: editVersion,
        description: editDescription,
        content,
      }),
    })
      .then(detail => {
        setSelected(detail);
        setDetectedVars(detail.detectedFields || []);
        setPreviewHtml(content);
        toast(`Template "${detail.name}" guardado correctamente`, 'success');
        loadList();
      })
      .catch(err => toast(`Error al guardar: ${err.message}`, 'error'))
      .finally(() => setSaving(false));
  }, [selected, api, editDomain, editVersion, editDescription, toast, loadList]);

  // ── Change status (PATCH) ───────────────────────────────────────────────────
  const changeStatus = useCallback((newStatus) => {
    if (!selected) return;
    api(`/v1/templates/${encodeURIComponent(selected.name)}/status`, {
      method: 'PATCH',
      body: JSON.stringify({ status: newStatus }),
    })
      .then(t => {
        setSelected(prev => ({ ...prev, status: t.status }));
        toast(`Estado cambiado a ${newStatus}`, newStatus === 'ACTIVE' ? 'success' : 'warn');
        loadList();
      })
      .catch(err => toast(`Error al cambiar estado: ${err.message}`, 'error'));
  }, [selected, api, toast, loadList]);

  // ── API base change ─────────────────────────────────────────────────────────
  const handleApiChange = (v) => {
    setApiBase(v);
    localStorage.setItem('api_base', v);
  };

  // ── Render ──────────────────────────────────────────────────────────────────
  return e(React.Fragment, null,
    // Header
    e('header', { className: 'app-header' },
      e('h1', null, '⚙ Document Generator — Template Editor'),
      e('div', { className: 'api-badge' },
        e('span', null, 'API'),
        e('input', { value: apiBase, onChange: ev => handleApiChange(ev.target.value), spellCheck: false })
      )
    ),

    // Workspace
    e('div', { className: 'workspace' },

      // Sidebar
      e('aside', { className: 'sidebar' },
        e('div', { className: 'sidebar-header' },
          e('span', null, `Templates (${templates.length})`),
          e('button', { className: 'btn-icon', onClick: loadList, title: 'Recargar' },
            loadingList
              ? e('span', { className: 'spinner' })
              : e('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 2 },
                  e('path', { d: 'M23 4v6h-6M1 20v-6h6' }),
                  e('path', { d: 'M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15' })
                )
          )
        ),
        e('div', { className: 'template-list' },
          templates.length === 0 && !loadingList
            ? e('div', { style: { padding: '24px 16px', color: 'var(--text-muted)', fontSize: 12 } },
                'No hay templates. Verificá la URL de la API.')
            : templates.map(t =>
                e('div', {
                  key: t.id,
                  className: `template-item ${selected && selected.name === t.name ? 'active' : ''}`,
                  onClick: () => selectTemplate(t.name),
                },
                  e('div', { className: 't-name' }, t.name),
                  e('div', { className: 't-meta' },
                    e('span', { className: `status-badge status-${t.status}` }, t.status),
                    e('span', null, t.domain),
                    e('span', null, `v${t.version}`),
                  )
                )
              )
        )
      ),

      // Main
      e('main', { className: 'main' },
        selected
          ? e(React.Fragment, null,

              // Toolbar
              e('div', { className: 'toolbar' },
                e('div', { className: 't-title' }, selected.name),

                // Meta fields
                e('div', { className: 'meta-row' },
                  e('div', { className: 'field-group' },
                    e('label', null, 'Domain'),
                    e('select', {
                      className: 'field-input', value: editDomain,
                      onChange: ev => setEditDomain(ev.target.value)
                    }, ...DOMAINS.map(d => e('option', { key: d, value: d }, d)))
                  ),
                  e('div', { className: 'field-group' },
                    e('label', null, 'Version'),
                    e('input', {
                      className: 'field-input', style: { width: 80 },
                      value: editVersion, onChange: ev => setEditVersion(ev.target.value),
                      placeholder: '1.0.0'
                    })
                  ),
                  e('div', { className: 'field-group' },
                    e('label', null, 'Descripción'),
                    e('input', {
                      className: 'field-input', style: { width: 200 },
                      value: editDescription, onChange: ev => setEditDesc(ev.target.value),
                      placeholder: 'Descripción opcional'
                    })
                  ),
                ),

                // Status change
                selected.status !== 'ACTIVE'
                  ? e('button', { className: 'btn btn-success', onClick: () => changeStatus('ACTIVE') }, '▶ Activar')
                  : null,
                selected.status !== 'INACTIVE'
                  ? e('button', { className: 'btn btn-warn', onClick: () => changeStatus('INACTIVE') }, '⏸ Pausar')
                  : null,
                selected.status !== 'DEPRECATED'
                  ? e('button', { className: 'btn btn-danger', onClick: () => changeStatus('DEPRECATED') }, '✕ Deprecar')
                  : null,

                // Preview
                e('button', { className: 'btn btn-secondary', onClick: refreshPreview }, '👁 Preview'),

                // Save
                e('button', {
                  className: 'btn btn-primary',
                  onClick: saveTemplate,
                  disabled: saving,
                },
                  saving ? e('span', { className: 'spinner' }) : null,
                  saving ? ' Guardando…' : '💾 Guardar'
                ),
              ),

              // Editor + Preview
              e('div', { className: 'editor-area' },

                // Monaco pane
                e('div', { className: 'editor-pane' },
                  e('div', { className: 'editor-pane-header' },
                    e('span', null, 'HTML Mustache'),
                    e('span', { style: { fontSize: 11, color: 'var(--text-muted)' } },
                      `${editorHtml.length} chars`)
                  ),
                  e('div', { id: 'monaco-container', style: loading ? { display: 'none' } : {} }),
                  loading && e('div', { className: 'placeholder' },
                    e('span', { className: 'spinner', style: { width: 24, height: 24, borderWidth: 3 } }),
                    e('p', null, 'Cargando template…')
                  ),

                  // Variables detected
                  detectedVars.length > 0
                    ? e('div', { className: 'vars-panel' },
                        e('span', { style: { fontSize: 10, color: 'var(--text-muted)', marginRight: 4 } }, 'VARS:'),
                        ...detectedVars.map(v => e('span', { key: v, className: 'var-chip' }, `{{${v}}}`))
                      )
                    : null,
                ),

                // Preview pane
                e('div', { className: 'preview-pane' },
                  e('div', { className: 'preview-pane-header' },
                    e('span', null, 'Preview HTML'),
                    e('button', {
                      className: 'btn btn-secondary',
                      style: { padding: '3px 10px', fontSize: 11 },
                      onClick: refreshPreview
                    }, '⟳ Refrescar')
                  ),
                  e('iframe', {
                    className: 'preview-iframe',
                    srcDoc: previewHtml || '<html><body style="display:flex;align-items:center;justify-content:center;height:100%;color:#aaa;font-family:sans-serif"><p>Preview vacío</p></body></html>',
                    sandbox: 'allow-same-origin',
                  })
                )
              )
            )
          : e('div', { className: 'placeholder' },
              e('svg', { width: 56, height: 56, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1 },
                e('path', { d: 'M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z' }),
                e('polyline', { points: '14 2 14 8 20 8' }),
                e('line', { x1: 16, y1: 13, x2: 8, y2: 13 }),
                e('line', { x1: 16, y1: 17, x2: 8, y2: 17 }),
                e('polyline', { points: '10 9 9 9 8 9' })
              ),
              e('p', null, 'Seleccioná un template de la lista para editar')
            )
      )
    ),

    // Toasts
    e(ToastContainer, { toasts })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
