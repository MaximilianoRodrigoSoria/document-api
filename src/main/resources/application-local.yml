server:
  port: 8080

spring:
  # ─── PostgreSQL (local via docker-compose) ────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:files}?TimeZone=UTC
    username: ${DB_USER:user}
    password: ${DB_PASS:password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 3000
      idle-timeout: 300000
      max-lifetime: 1200000
      keepalive-time: 60000

  # ─── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:files}?TimeZone=UTC
    user: ${DB_USER:user}
    password: ${DB_PASS:password}

  # ─── Kafka (local via docker-compose) ─────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
    replicas: 1

# ─── GCS (local via fake-gcs-server) ─────────────────────────────────────────
gcs:
  emulator-host: http://localhost:4443
  public-url-base: http://localhost:4443
  project-id: local-project
  bucket-name: document-generator-bucket

# ─── Scheduler — config rapida para desarrollo local ─────────────────────────
document-generation:
  schedule:
    fixed-delay: 30000
    batch-size: 20
    recovery-timeout-minutes: 5
# --- Firma criptografica PDF (PAdES/PKCS#7) ----------------------------------
# En produccion sobreescribir via env vars: SIGNING_KS_PATH y SIGNING_KS_PASS
signing:
  enabled: true
  keystore-path: ${SIGNING_KS_PATH:config/signing-keystore.p12}
  keystore-password: ${SIGNING_KS_PASS:changeit}
  alias: document-signer
  signer-name: Max Lab Document Signer
  reason: Documento generado automaticamente
  location: ""

logging:
  level:
    ar.com.laboratory: DEBUG
