apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${CI_PROJECT_NAME}
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: ${CI_PROJECT_NAME}
  template:
    metadata:
      labels:
        app: ${CI_PROJECT_NAME}
    spec:
      containers:
        - name: ${CI_PROJECT_NAME}
          image: foo/bar
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: ${CI_PROJECT_NAME}-configmap
          env:
            - name: CI_JOB_ID
              value: "${CI_JOB_ID}"
            - name: MY_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name

            # ── PostgreSQL ────────────────────────────────────────────────────
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: databasecredentials
                  key: db_pwd_document_generator_api
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: databasecredentials
                  key: db_usr_document_generator_api
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: databasecredentials
                  key: db_nme_document_generator_api
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: database-username-host
                  key: database-dns-capa-b-flexible

            # ── Kafka (mismas credenciales que payment-loyalty) ───────────────
            - name: KAFKA_API_CLIENT
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: kafka-api-client
            - name: KAFKA_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: kafka-api-secret
            - name: KAFKA_HOST
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: kafka-dns
            - name: KAFKA_SECURITY_PROTOCOL
              valueFrom:
                secretKeyRef:
                  name: kafka-credentials
                  key: kafka-security-protocol

            # ── Redis ─────────────────────────────────────────────────────────
            # REDIS_SENTINELS se inyecta desde el ConfigMap (env por ambiente)
            - name: REDIS_PASS
              valueFrom:
                secretKeyRef:
                  name: databasecredentials
                  key: db_pwd_redis

            # ── Observabilidad ────────────────────────────────────────────────
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "product=${OTEL_RESOURCE_ATTRIBUTES_PRODUCT},team=${OTEL_RESOURCE_ATTRIBUTES_TEAM},service.instance.id=$(MY_POD_NAME),service.namespace=tenpo-document-generator-api"

          startupProbe:
            httpGet:
              path: /document-generator-api/actuator/health
              port: 80
            initialDelaySeconds: 60
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /document-generator-api/actuator/health
              port: 80
            initialDelaySeconds: 15
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /document-generator-api/actuator/health
              port: 80
            initialDelaySeconds: 15
            timeoutSeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          imagePullPolicy: Always
      imagePullSecrets:
        - name: ${CI_PROJECT_NAME}
